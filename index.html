<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Picker</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #e0e0e0;
        }

        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        #main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }

        #canvas-container {
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #333;
        }

        canvas { max-width: 100%; display: block; }

        #sidebar {
            width: 350px;
            background: var(--panel);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        button {
            background: #bb86fc;
            border: none;
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
        }

        .secondary { background: #333; color: white; }

        /* The Big Box */
        #output-box {
            flex-grow: 1;
            width: 100%;
            background: #000;
            color: #00ff00;
            font-family: monospace;
            font-size: 16px;
            padding: 15px;
            border: 1px solid #444;
            box-sizing: border-box;
            resize: none;
            margin-top: 10px;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="main">
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</div>

<div id="sidebar">
    <button onclick="document.getElementById('uploader').click()">Upload Image</button>
    <input type="file" id="uploader" accept="image/*">
    
    <button class="secondary" id="undo-btn">Undo Last</button>
    
    <textarea id="output-box" placeholder="HEX codes will appear here..."></textarea>
    
    <p style="font-size: 12px; color: #888; margin-top: 10px;">
        Click image to add colors. Refresh to reset.
    </p>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const uploader = document.getElementById('uploader');
    const outputBox = document.getElementById('output-box');
    const undoBtn = document.getElementById('undo-btn');
    
    let colors = [];

    uploader.addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    canvas.addEventListener('click', (e) => {
        if (canvas.width === 0) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        const p = ctx.getImageData(x, y, 1, 1).data;
        const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1).toUpperCase();
        
        colors.push(hex);
        updateDisplay();
    });

    undoBtn.addEventListener('click', () => {
        colors.pop();
        updateDisplay();
    });

    function updateDisplay() {
        outputBox.value = colors.join(', ');
    }
</script>

</body>
</html>
