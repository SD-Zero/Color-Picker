<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Color Picker</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #e0e0e0;
            --accent: #bb86fc;
            --danger: #cf6679;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Canvas Area */
        #main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }

        #canvas-container {
            position: relative;
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-image: linear-gradient(45deg, #1a1a1a 25%, transparent 25%), 
                              linear-gradient(-45deg, #1a1a1a 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #1a1a1a 75%), 
                              linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 20px 20px;
        }

        canvas { max-width: 100%; display: block; }

        /* Sidebar */
        #sidebar {
            width: 320px;
            background-color: var(--panel);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .controls-top { margin-bottom: 20px; }

        button {
            background: var(--accent);
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            color: #000;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button.secondary { background: #333; color: white; }
        button.copy-all { background: #03dac6; color: #000; margin-top: 10px; }

        #color-list {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .color-item {
            display: flex;
            align-items: center;
            background: #2a2a2a;
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .swatch {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            margin-right: 12px;
            border: 1px solid #444;
        }

        .hex-code { font-family: 'Courier New', monospace; flex-grow: 1; font-size: 14px; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="main">
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</div>

<div id="sidebar">
    <div class="controls-top">
        <button onclick="document.getElementById('uploader').click()">Upload New Image</button>
        <input type="file" id="uploader" accept="image/*">
        
        <div class="btn-group">
            <button class="secondary" id="undo-btn">Undo</button>
            <button class="secondary" onclick="location.reload()">Reset</button>
        </div>

        <button class="copy-all" id="copy-all-btn">Copy List (#HEX, #HEX)</button>
    </div>

    <ul id="color-list"></ul>
    <p style="font-size: 11px; color: #888; text-align: center;">Click image to pick color</p>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const uploader = document.getElementById('uploader');
    const colorList = document.getElementById('color-list');
    const undoBtn = document.getElementById('undo-btn');
    const copyAllBtn = document.getElementById('copy-all-btn');
    
    let colors = [];

    uploader.addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    canvas.addEventListener('click', (e) => {
        if (canvas.width === 0) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        const p = ctx.getImageData(x, y, 1, 1).data;
        const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1).toUpperCase();
        
        colors.push(hex);
        renderList();
    });

    undoBtn.addEventListener('click', () => {
        colors.pop();
        renderList();
    });

    copyAllBtn.addEventListener('click', () => {
        if (colors.length === 0) return;
        const text = colors.join(', ');
        navigator.clipboard.writeText(text);
        
        const originalText = copyAllBtn.innerText;
        copyAllBtn.innerText = "COPIED!";
        setTimeout(() => copyAllBtn.innerText = originalText, 1500);
    });

    function renderList() {
        colorList.innerHTML = '';
        // Display latest at the top
        [...colors].reverse().forEach((hex) => {
            const li = document.createElement('li');
            li.className = 'color-item';
            li.innerHTML = `
                <div class="swatch" style="background: ${hex}"></div>
                <span class="hex-code">${hex}</span>
            `;
            colorList.appendChild(li);
        });
    }
</script>

</body>
</html>
