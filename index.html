<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Color Picker</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #e0e0e0;
            --accent: #bb86fc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: row;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Responsive layout for mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100% !important; height: 40%; border-left: none !important; border-top: 1px solid #333; }
        }

        #main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: auto;
            background: #181818;
        }

        #canvas-container {
            position: relative;
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas { max-width: 100%; height: auto; display: block; }

        #sidebar {
            width: 350px;
            background-color: var(--panel);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .controls { margin-bottom: 15px; display: flex; gap: 10px; }

        button {
            background: var(--accent);
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            color: #000;
        }

        button.secondary { background: #333; color: white; }

        /* The Plain Text Box */
        #output-box {
            width: 100%;
            height: 120px;
            background: #000;
            color: #00ff00; /* Terminal vibe for visibility */
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        #color-list {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .color-item {
            display: flex;
            align-items: center;
            background: #2a2a2a;
            margin-bottom: 5px;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        .swatch {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            margin-right: 10px;
        }

        input[type="file"] { display: none; }
        label { width: 100%; }
    </style>
</head>
<body>

<div id="main">
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</div>

<div id="sidebar">
    <div class="controls">
        <button onclick="document.getElementById('uploader').click()">Upload Image</button>
        <input type="file" id="uploader" accept="image/*">
        <button class="secondary" id="undo-btn">Undo</button>
    </div>

    <p style="font-size: 12px; margin-bottom: 5px; color: var(--accent);">Copy from here:</p>
    <textarea id="output-box" readonly placeholder="Colors will appear here..."></textarea>

    <div id="color-list"></div>
    <p style="font-size: 11px; color: #888; text-align: center; margin-top: 10px;">
        Tap image to pick. Refresh to reset.
    </p>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const uploader = document.getElementById('uploader');
    const outputBox = document.getElementById('output-box');
    const colorList = document.getElementById('color-list');
    const undoBtn = document.getElementById('undo-btn');
    
    let colors = [];

    uploader.addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    canvas.addEventListener('click', (e) => {
        if (canvas.width === 0) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        const p = ctx.getImageData(x, y, 1, 1).data;
        const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1).toUpperCase();
        
        colors.push(hex);
        updateDisplay();
    });

    undoBtn.addEventListener('click', () => {
        colors.pop();
        updateDisplay();
    });

    // Tap to select all text (helpful for iOS)
    outputBox.addEventListener('click', function() {
        this.select();
        this.setSelectionRange(0, 99999); 
    });

    function updateDisplay() {
        // Update the copyable text box
        outputBox.value = colors.join(', ');

        // Update the visual list below it
        colorList.innerHTML = '';
        [...colors].reverse().forEach((hex) => {
            const div = document.createElement('div');
            div.className = 'color-item';
            div.innerHTML = `<div class="swatch" style="background: ${hex}"></div><span>${hex}</span>`;
            colorList.appendChild(div);
        });
    }
</script>

</body>
</html>
